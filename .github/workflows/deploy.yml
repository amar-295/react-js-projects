name: Deploy multiple React apps to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build bgChanger
        run: cd bgChanger && npm install && npm run build

      - name: Build passwordGenerator
        run: cd passwordGenerator && npm install && npm run build

      - name: Build reactRouter
        run: cd reactRouter && npm install && npm run build

      - name: Build themeSwitcher
        run: cd themeSwitcher && npm install && npm run build

      - name: Build miniContext
        run: cd miniContext && npm install && npm run build

      # currencyConverter and todoContext builds removed as they are not tracked in the repo yet
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (Root folder including all dists)
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
